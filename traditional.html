<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RSVP — Traditional Ceremony</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ===== THEME: TRADITIONAL (burgundy) ===== */
  :root{
    --bg:#f4ede1; --card:#fbf7f0; --ink:#2c2622; --muted:#7a6f63;
    --line:#e3d7c6; --accent:#6e1f2a; --accent-ink:#fff; --err:#b23a2e;
    --hero-photo:none; /* replaced with url(data:image...) once photo is sent */
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;padding:0 0 40px}
  .wrap{max-width:440px;margin:0 auto;padding:0 18px}
  .hero{position:relative;margin:0 -18px 26px;padding:52px 24px 44px;text-align:center;color:#fff;
    background-image:linear-gradient(rgba(110,31,42,.82),rgba(110,31,42,.92)),var(--hero-photo);
    background-color:var(--accent);background-size:cover;background-position:center}
  .names{font-family:Fraunces,serif;font-weight:500;font-size:36px;line-height:1.08;margin:0}
  .amp{font-style:italic;font-weight:400;opacity:.9}
  .date{font-family:Fraunces,serif;font-style:italic;margin:12px 0 0;font-size:17px;opacity:.95}
  .byline{margin:14px 0 0;font-size:12px;letter-spacing:.16em;text-transform:uppercase;opacity:.9}
  .note-hero{font-family:Fraunces,serif;font-style:italic;margin:12px 0 0;font-size:13.5px;opacity:.82}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 20px}
  label{display:block;font-weight:500;font-size:14px;margin:0 0 6px}
  .field{margin:0 0 16px}
  input[type=text],input[type=tel]{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff;color:var(--ink);font-family:inherit}
  input:focus{outline:none;border-color:var(--accent)}
  .hint{font-size:12.5px;color:var(--muted);margin:5px 0 0}
  .seg{display:flex;gap:8px}
  .seg label{flex:1;margin:0;position:relative;cursor:pointer}
  .seg input{position:absolute;opacity:0}
  .seg span{display:block;text-align:center;padding:11px 8px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:14.5px;transition:.15s}
  .seg input:checked+span{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .plus{display:none;border-top:1px dashed var(--line);margin-top:6px;padding-top:16px}
  .plus.show{display:block}
  .btn{width:100%;padding:14px;border:0;border-radius:12px;background:var(--accent);color:var(--accent-ink);font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:6px}
  .btn:disabled{opacity:.6}
  .msg{font-size:13px;color:var(--err);margin:10px 0 0;min-height:1px}
  .done{text-align:center;padding:34px 10px}
  .done h2{font-family:Fraunces,serif;font-weight:500;font-size:26px;margin:0 0 10px}
  .done p{color:var(--muted);margin:0}
  footer{text-align:center;margin:22px 0 0}
  footer a{color:var(--muted);text-decoration:none;font-size:12px;display:block;line-height:1.8}
  .tag{letter-spacing:.16em;text-transform:uppercase;font-size:10.5px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <p class="names">Christian <span class="amp">&amp;</span> Christina</p>
    <p class="date">Traditional Ceremony &middot; Saturday, 5 December 2026</p>
    <p class="byline">Kindly reply by 14 November 2026</p>
    <p class="note-hero">An adults-only celebration &middot; By invitation only</p>
  </div>

  <div class="card" id="card">
    <div class="field">
      <label for="first">First name</label>
      <input type="text" id="first" autocomplete="given-name" placeholder="e.g. Chidinma">
    </div>
    <div class="field">
      <label for="last">Last name</label>
      <input type="text" id="last" autocomplete="family-name" placeholder="e.g. Okafor">
    </div>
    <div class="field">
      <label for="phone">Phone number</label>
      <input type="tel" id="phone" inputmode="numeric" autocomplete="tel" placeholder="e.g. 0412345678">
      <p class="hint">Australian mobile, must start with 04 and be 10 digits.</p>
    </div>

    <div class="field">
      <label>Will you be attending?</label>
      <div class="seg" id="attend">
        <label><input type="radio" name="att" value="yes"><span>Joyfully accept</span></label>
        <label><input type="radio" name="att" value="no"><span>Regretfully decline</span></label>
      </div>
    </div>

    <div id="poWrap" class="field" style="display:none">
      <label>Are you bringing a plus one?</label>
      <div class="seg" id="po">
        <label><input type="radio" name="pon" value="yes"><span>Yes</span></label>
        <label><input type="radio" name="pon" value="no"><span>No</span></label>
      </div>
      <p class="hint">Adults only, please.</p>
    </div>

    <div id="plus" class="plus">
      <div class="field">
        <label for="p1first">Plus one's first name</label>
        <input type="text" id="p1first" placeholder="e.g. Emeka">
      </div>
      <div class="field">
        <label for="p1last">Plus one's last name</label>
        <input type="text" id="p1last" placeholder="e.g. Obi">
      </div>
      <div class="field" style="margin-bottom:4px">
        <label for="p1phone">Plus one's phone <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
        <input type="tel" id="p1phone" inputmode="numeric" placeholder="e.g. 0412345678">
      </div>
    </div>

    <button class="btn" id="send">Send RSVP</button>
    <p class="msg" id="msg"></p>
  </div>

  <footer>
    <a href="https://echolabsgroup.com" target="_blank" rel="noopener">Brought to you by ECHOLABSGROUP.COM</a>
    <a class="tag" href="https://echolabsgroup.com" target="_blank" rel="noopener">Plugged In. Stage Ready.</a>
  </footer>
</div>

<script>
  var ENDPOINT = "https://script.google.com/macros/s/AKfycbwQqwZbKwEyel1FTcvWmFy1uwdfU1U4wf3x5YhUcTjkl6C_GK5MFa6gJEV8xKMAEFCj/exec";
  var EVENT = "traditional";

  var $ = function(id){ return document.getElementById(id); };
  var msg = $('msg'), send = $('send');
  var NAME_RE = /^[A-Za-z][A-Za-z '\-]*$/;
  var PHONE_RE = /^04\d{8}$/;

  function attVal(){ var r=document.querySelector('input[name=att]:checked'); return r?r.value:''; }
  function poVal(){ var r=document.querySelector('input[name=pon]:checked'); return r?r.value:''; }

  $('attend').addEventListener('change', function(){
    var yes = attVal()==='yes';
    $('poWrap').style.display = yes ? 'block' : 'none';
    if(!yes){ $('plus').classList.remove('show'); }
    else { $('plus').classList.toggle('show', poVal()==='yes'); }
  });
  $('po').addEventListener('change', function(){
    $('plus').classList.toggle('show', poVal()==='yes');
  });

  function digits(v){ return String(v||'').replace(/[^\d]/g,''); }
  function fail(t){ msg.textContent=t; send.disabled=false; send.textContent='Send RSVP'; }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];}); }

  function done(name, att){
    var c=$('card');
    if(att==='yes'){
      c.innerHTML='<div class="done"><h2>Thank you, '+esc(name)+'.</h2><p>Your RSVP is in. We can\'t wait to celebrate with you.</p></div>';
    } else {
      c.innerHTML='<div class="done"><h2>Thank you, '+esc(name)+'.</h2><p>We\'re sorry you can\'t make it, and thank you for letting us know.</p></div>';
    }
  }

  function submit(){
    msg.textContent='';
    var first=$('first').value.trim(), last=$('last').value.trim();
    var phone=digits($('phone').value), att=attVal();

    if(!first){ return fail('Please enter your first name.'); }
    if(!NAME_RE.test(first)){ return fail('First name should be letters only.'); }
    if(!last){ return fail('Please enter your last name.'); }
    if(!NAME_RE.test(last)){ return fail('Last name should be letters only.'); }
    if(!PHONE_RE.test(phone)){ return fail('Enter a mobile starting with 04, 10 digits total.'); }
    if(!att){ return fail('Please let us know if you can attend.'); }

    var plus = att==='yes' && poVal()==='yes';
    var p1first = plus ? $('p1first').value.trim() : '';
    var p1last  = plus ? $('p1last').value.trim()  : '';
    var p1phone = plus ? digits($('p1phone').value) : '';
    if(plus){
      if(!p1first || !NAME_RE.test(p1first)){ return fail("Enter your plus one's first name (letters only)."); }
      if(!p1last  || !NAME_RE.test(p1last)){  return fail("Enter your plus one's last name (letters only)."); }
      if(p1phone && !PHONE_RE.test(p1phone)){ return fail("Plus one's number must start with 04 (10 digits), or leave it blank."); }
    }

    send.disabled=true; send.textContent='Sending\u2026';
    var s, cb='rsvp_'+Date.now();
    var params={action:'rsvp',callback:cb,event:EVENT,first:first,last:last,phone:phone,
      attending:att,plusone:poVal()||'no',p1first:p1first,p1last:p1last,p1phone:p1phone};

    var t=setTimeout(function(){ cleanup(); fail('Could not reach the server. Check your connection and try again.'); },15000);
    function cleanup(){ send.disabled=false; send.textContent='Send RSVP';
      try{ delete window[cb]; }catch(e){ window[cb]=undefined; }
      if(s&&s.parentNode) s.parentNode.removeChild(s); }

    window[cb]=function(res){ clearTimeout(t); cleanup();
      if(res && res.status==='ok'){ done(first+' '+last, att); }
      else { fail((res&&res.message)?res.message:'Something went wrong. Please try again.'); }
    };

    var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
    s=document.createElement('script');
    s.src=ENDPOINT+'?'+qs;
    s.onerror=function(){ clearTimeout(t); cleanup(); fail('Could not reach the server. Please try again.'); };
    document.body.appendChild(s);
  }
  send.addEventListener('click', submit);
</script>
</body>
</html>
