<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Find Your Table — White Wedding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --card:#ffffff; --ink:#25302a; --muted:#6f7a70;
    --line:#dbe3da; --accent:#3f6b4f; --accent-ink:#fff; --err:#b23a2e;
    --hero-photo:url('white-wedding.jpg');
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;color:#fff;font-family:Inter,system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:34px 16px;
    background-color:#1a2a21;
    background-image:linear-gradient(rgba(22,38,29,.72),rgba(22,38,29,.88)),var(--hero-photo);
    background-size:cover;background-position:center}
  .stage{width:100%;max-width:440px;flex:1;display:flex;flex-direction:column}
  .mid{flex:1;display:flex;flex-direction:column;justify-content:center}
  .hero{text-align:center;margin:0 0 22px}
  .names{font-family:Fraunces,serif;font-weight:500;font-size:36px;line-height:1.06;margin:0}
  .amp{display:block;font-style:italic;font-weight:400;font-size:26px;opacity:.85;margin:2px 0}
  .sub{font-family:Fraunces,serif;font-style:italic;margin:10px 0 0;font-size:15px;opacity:.9}
  .card{background:var(--card);color:var(--ink);border-radius:16px;padding:22px 20px}
  label{display:block;font-weight:500;font-size:14px;margin:0 0 6px}
  input[type=text]{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff;color:var(--ink);font-family:inherit}
  input:focus{outline:none;border-color:var(--accent)}
  .btn{width:100%;padding:14px;border:0;border-radius:12px;background:var(--accent);color:var(--accent-ink);font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:12px}
  .btn:disabled{opacity:.6}
  .out{margin-top:18px}
  .hint{font-size:13.5px;color:var(--muted);text-align:center;margin:0}
  .bad{color:var(--err)}
  .result{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;text-align:center;opacity:0;transform:translateY(4px);transition:.25s}
  .result.show{opacity:1;transform:none}
  .who{font-family:Fraunces,serif;font-size:20px;margin:0 0 6px}
  .tlabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:10px 0 0}
  .tnum{font-family:Fraunces,serif;font-size:44px;margin:2px 0 0}
  .tbd{font-family:Fraunces,serif;font-style:italic;font-size:17px;margin:10px 0 0;color:var(--muted)}
  .note{font-size:12.5px;color:var(--muted);margin:12px 0 0}
  .pick{list-style:none;padding:0;margin:8px 0 0;display:flex;flex-direction:column;gap:8px}
  .pick button{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;background:#fff;font-family:inherit;font-size:15px;cursor:pointer}
  .again{margin-top:14px;background:none;border:none;color:var(--accent);font-family:inherit;font-size:13.5px;text-decoration:underline;cursor:pointer;padding:0}
  footer{text-align:center;padding-top:24px}
  footer a{color:rgba(255,255,255,.82);text-decoration:none;font-size:12px;display:block;line-height:1.8}
  .tag{letter-spacing:.16em;text-transform:uppercase;font-size:10.5px;opacity:.9}
</style>
</head>
<body>
<div class="stage">
  <div class="mid">
    <div class="hero">
      <p class="names">Christian<span class="amp">&amp;</span>Cristina</p>
      <p class="sub">White Wedding &middot; Find Your Table</p>
    </div>

    <div class="card">
      <label for="q">Your name or mobile</label>
      <input type="text" id="q" placeholder="e.g. Chidinma Okafor or 0412345678" autocomplete="name">
      <button class="btn" id="go">Find my table</button>
      <div class="out" id="out"></div>
    </div>
  </div>

  <footer>
    <a href="https://echolabsgroup.com" target="_blank" rel="noopener">Brought to you by ECHOLABSGROUP.COM</a>
    <a class="tag" href="https://echolabsgroup.com" target="_blank" rel="noopener">Plugged In. Stage Ready.</a>
    <a href="mailto:team@echolabsgroup.com?subject=Digital%20seating%20page%20enquiry">Enquire about your own · team@echolabsgroup.com</a>
  </footer>
</div>

<script>
  var ENDPOINT = "https://script.google.com/macros/s/AKfycbwQqwZbKwEyel1FTcvWmFy1uwdfU1U4wf3x5YhUcTjkl6C_GK5MFa6gJEV8xKMAEFCj/exec";
  var EVENT = "white";

  var $=function(id){return document.getElementById(id);};
  var input=$('q'), out=$('out'), go=$('go');

  function esc(s){return String(s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
  var again=function(){return '<button type="button" class="again" id="again">Search again</button>';};
  function bindAgain(){var a=$('again'); if(a) a.addEventListener('click',function(){out.innerHTML='';input.value='';input.focus();});}

  function setBusy(b){ go.disabled=b; go.textContent = b ? 'Searching\u2026' : 'Find my table'; }

  function renderCard(m){
    var tableHtml = m.table
      ? '<p class="tlabel">Table</p><p class="tnum">'+esc(m.table)+'</p><p class="note">Show this to a host if you need a hand finding it.</p>'
      : '<p class="tbd">Your seat is being finalised.</p><p class="note">Please check with a host on the day.</p>';
    out.innerHTML = '<div class="result show"><p class="who">'+esc(m.name)+'</p>'+tableHtml+'</div>'+again();
    bindAgain();
  }
  function renderPick(rows){
    var items = rows.map(function(r,i){ return '<li><button type="button" data-i="'+i+'">'+esc(r.name)+'</button></li>'; }).join('');
    out.innerHTML = '<div class="result show"><p class="hint">More than one match \u2014 tap your name:</p><ul class="pick">'+items+'</ul></div>';
    out.querySelectorAll('button[data-i]').forEach(function(b){
      b.addEventListener('click', function(){ renderCard(rows[+b.dataset.i]); });
    });
  }
  function renderNone(name){
    out.innerHTML = '<div class="result show"><p class="hint">No match for \u201c'+esc(name)+'\u201d. Check the spelling, try your full name, or ask a host.</p></div>'+again();
    bindAgain();
  }
  function renderErr(){
    out.innerHTML = '<div class="result show bad"><p class="hint bad">Couldn\'t reach the seating list. Check your connection and try again.</p></div>'+again();
    bindAgain();
  }

  function search(){
    var name = input.value.trim();
    if(!name){ input.focus(); return; }
    setBusy(true);
    out.innerHTML='';

    var s, cb='seat_'+Date.now();
    var t=setTimeout(function(){ cleanup(); renderErr(); }, 15000);
    function cleanup(){ setBusy(false); try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(s&&s.parentNode) s.parentNode.removeChild(s); }

    window[cb]=function(res){
      clearTimeout(t); cleanup();
      if(!res || res.status!=='ok'){ renderErr(); return; }
      var m = Array.isArray(res.matches) ? res.matches : [];
      if(m.length===0) renderNone(name);
      else if(m.length===1) renderCard(m[0]);
      else renderPick(m);
    };

    var qs = 'action=findSeat&callback='+encodeURIComponent(cb)+'&event='+EVENT+'&q='+encodeURIComponent(name);
    s=document.createElement('script');
    s.src=ENDPOINT+'?'+qs;
    s.onerror=function(){ clearTimeout(t); cleanup(); renderErr(); };
    document.body.appendChild(s);
  }

  go.addEventListener('click', search);
  input.addEventListener('keydown', function(e){ if(e.key==='Enter') search(); });
</script>
</body>
</html>
