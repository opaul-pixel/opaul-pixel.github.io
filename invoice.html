<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Echo Labs — Invoice & Quote Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--dark:#1a1a1c;--cream:#f0ede5;--muted:rgba(26,26,28,.4);--border:rgba(26,26,28,.12);--ib:rgba(26,26,28,.18);--white:#fff;--r:10px}
  body{background:var(--cream);color:var(--dark);font-family:'Geist',-apple-system,sans-serif;font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased}
  .nav{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .nav .wm{font-size:17px;font-weight:500;letter-spacing:-.03em}
  .nav .sub{font-size:10px;color:var(--muted)}
  .tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--border)}
  .tab{padding:12px 20px;font-size:14px;font-weight:400;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;text-transform:capitalize}
  .tab.active{font-weight:500;color:var(--dark);border-bottom-color:var(--dark)}
  .wrap{max-width:720px;margin:0 auto;padding:24px 20px 80px}
  label.fl{display:block;font-size:12px;font-weight:500;margin-bottom:4px}
  input,select,textarea{width:100%;background:var(--white);border:1.5px solid var(--ib);border-radius:var(--r);padding:10px 12px;font-family:inherit;font-size:14px;color:var(--dark);outline:none}
  input:focus,select:focus,textarea:focus{border-color:rgba(26,26,28,.45);box-shadow:0 0 0 3px rgba(26,26,28,.06)}
  textarea{resize:vertical;min-height:55px}
  .field{margin-bottom:14px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .item{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
  .item .amt{font-size:12px;color:var(--muted)}
  .item .rm{background:none;border:none;color:#c44;font-size:12px;cursor:pointer;font-family:inherit;padding:4px 8px}
  .additem{background:none;border:1.5px dashed var(--ib);border-radius:var(--r);padding:10px 16px;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit;width:100%}
  .totals{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;margin:6px 0 18px}
  .totals .row{display:flex;justify-content:space-between;align-items:center}
  .totals .sub{margin-bottom:6px;font-size:13px;color:var(--muted)}
  .totals .sub b{color:var(--dark);font-weight:400}
  .totals .tot{padding-top:8px;border-top:1px solid var(--border);font-size:15px;font-weight:600}
  .status{padding:14px 16px;background:var(--dark);color:var(--cream);border-radius:var(--r);font-size:15px;font-weight:500;text-align:center;margin-bottom:12px}
  .gen{width:100%;background:var(--dark);color:var(--cream);font-family:inherit;font-size:15px;font-weight:500;padding:14px 0;border:none;border-radius:999px;cursor:pointer}
  .gen:disabled{opacity:.5;cursor:not-allowed}
  .hp-field{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0}
  .bank-head{display:flex;justify-content:space-between;align-items:center;margin:6px 0 8px}
  .bank-head .sech{margin:0}
  .bank-clear{font-size:11px;color:var(--muted);background:none;border:none;padding:0;cursor:pointer;font-family:inherit;text-decoration:underline}
  .bank-clear:hover{color:var(--dark)}
  .sech{font-size:12px;font-weight:500;margin:6px 0 8px}
  .loadrow{display:flex;gap:8px;margin-bottom:14px}
  .loadrow input{flex:1}
  .loadbtn{background:var(--dark);color:var(--cream);border:none;border-radius:var(--r);padding:0 18px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
</style>
</head>
<body>
  <div class="nav"><span class="wm">echo labs</span><span class="sub">Document Generator</span></div>
  <div class="tabs">
    <button class="tab active" data-tab="invoice">invoice</button>
    <button class="tab" data-tab="quote">quote</button>
  </div>
  <div class="wrap">
    <div class="loadrow">
      <input id="loadRef" placeholder="Load existing (e.g. INV-2026-014 or QT-2026-003)">
      <button type="button" class="loadbtn" id="loadBtn">Load</button>
    </div>

    <div class="grid2">
      <div class="field"><label class="fl" id="lbl-ref">Invoice #</label><input id="refNumber"></div>
      <div class="field"><label class="fl" id="lbl-date">Invoice Date</label><input type="date" id="date"></div>
    </div>
    <div class="grid2" id="invoice-dates">
      <div class="field"><label class="fl">Terms</label>
        <select id="terms"><option>Due on Receipt</option><option>Net 15</option><option>Net 30</option><option>Net 60</option></select>
      </div>
      <div class="field"><label class="fl">Due Date</label><input type="date" id="dueDate"></div>
    </div>
    <div class="field" id="quote-dates" style="display:none"><label class="fl">Expiry Date</label><input type="date" id="expiryDate"></div>

    <div class="field"><label class="fl">Bill To (Client Name)</label><input id="clientName" placeholder="Client name"></div>
    <div class="field"><label class="fl">Subject</label><input id="subject" placeholder="Subject"></div>

    <label class="fl sech">Line Items</label>
    <div id="items"></div>
    <button class="additem" id="addItem">+ Add line item</button>

    <div class="totals">
      <div class="row sub"><span>Sub Total</span><b id="subTotal">$0.00</b></div>
      <div class="row tot"><span id="totLabel">Balance Due</span><span id="grandTotal">$0.00</span></div>
    </div>

    <div class="bank-head">
      <label class="fl sech">Payment Details</label>
      <button type="button" class="bank-clear" id="clearBank">Clear saved details</button>
    </div>
    <div class="grid2">
      <div class="field"><label class="fl">BSB</label><input id="bsb" inputmode="numeric" placeholder="123456" maxlength="7"></div>
      <div class="field"><label class="fl">Account Number</label><input id="accountNo" inputmode="numeric" placeholder="1234567"></div>
    </div>
    <div class="field"><label class="fl">PayID (optional)</label><input id="payId" placeholder="Mobile / ABN / Email"></div>

    <div class="field"><label class="fl">Notes</label><textarea id="notes">Thank you for your business</textarea></div>
    <div class="field" id="tc-field" style="display:none"><label class="fl">Terms &amp; Conditions</label><textarea id="termsConditions">This quote is valid for 90 days</textarea></div>

    <input type="text" name="_gotcha" id="hp" class="hp-field" tabindex="-1" autocomplete="off" aria-hidden="true">
    <div class="status" id="status" style="display:none"></div>
    <button class="gen" id="generate">Download Invoice PDF</button>
  </div>

const LOGO_W=111,LOGO_H=200;
let tab="invoice";
let items=[{description:"",qty:1,rate:0,discount:0}];

const $=id=>document.getElementById(id);
const fmt=n=>n.toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().split("T")[0];
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split("T")[0]};
const fmtDate=s=>{if(!s)return"";const d=new Date(s+"T00:00:00");return d.toLocaleDateString("en-AU",{day:"2-digit",month:"2-digit",year:"numeric"})};
const genId=t=>{const n=Math.floor(Math.random()*9000)+1000;return(t==="invoice"?"INV-":"QT-")+n};

// init
$("refNumber").value=genId("invoice");
$("date").value=today();
$("dueDate").value=today();
$("expiryDate").value=addDays(today(),90);

// Load saved bank details from localStorage (per-device, per-origin)
const BANK_KEY="echolabs.bank.v1";
try{
  const saved=JSON.parse(localStorage.getItem(BANK_KEY)||"{}");
  if(saved.bsb)$("bsb").value=saved.bsb;
  if(saved.accountNo)$("accountNo").value=saved.accountNo;
  if(saved.payId)$("payId").value=saved.payId;
}catch(e){}

$("clearBank").addEventListener("click",()=>{
  if(!confirm("Clear saved bank details from this device?"))return;
  try{localStorage.removeItem(BANK_KEY)}catch(e){}
  $("bsb").value="";$("accountNo").value="";$("payId").value="";
  setStatus("Bank details cleared from this device");
});

function renderItems(){
  const c=$("items");c.innerHTML="";
  items.forEach((it,idx)=>{
    const amt=it.qty*it.rate*(1-it.discount/100);
    const div=document.createElement("div");div.className="item";
    div.innerHTML=`
      <div class="field"><label class="fl">Description</label><input data-i="${idx}" data-f="description" value="${it.description.replace(/"/g,'&quot;')}" placeholder="Item description"></div>
      <div class="grid3">
        <div class="field"><label class="fl">Qty</label><input type="number" min="0" step="0.01" data-i="${idx}" data-f="qty" value="${it.qty}"></div>
        <div class="field"><label class="fl">Rate ($)</label><input type="number" min="0" step="0.01" data-i="${idx}" data-f="rate" value="${it.rate}"></div>
        <div class="field"><label class="fl">Discount %</label><input type="number" min="0" max="100" step="0.01" data-i="${idx}" data-f="discount" value="${it.discount}"></div>
      </div>
      <div class="row" style="display:flex;justify-content:space-between;align-items:center">
        <span class="amt">Amount: $${fmt(amt)}</span>
        ${items.length>1?`<button class="rm" data-rm="${idx}">Remove</button>`:""}
      </div>`;
    c.appendChild(div);
  });
  c.querySelectorAll("input").forEach(inp=>{
    inp.addEventListener("input",e=>{
      const i=+e.target.dataset.i,f=e.target.dataset.f;
      items[i][f]=(f==="description")?e.target.value:(parseFloat(e.target.value)||0);
      updateTotals();
      if(f!=="description")renderItemAmount(i);
    });
  });
  c.querySelectorAll("[data-rm]").forEach(b=>b.addEventListener("click",e=>{
    items.splice(+e.target.dataset.rm,1);renderItems();updateTotals();
  }));
}
function renderItemAmount(i){
  const it=items[i];const amt=it.qty*it.rate*(1-it.discount/100);
  const spans=$("items").querySelectorAll(".amt");
  if(spans[i])spans[i].textContent="Amount: $"+fmt(amt);
}
function updateTotals(){
  const sub=items.reduce((s,i)=>s+i.qty*i.rate*(1-i.discount/100),0);
  $("subTotal").textContent="$"+fmt(sub);
  $("grandTotal").textContent="$"+fmt(sub);
}

$("addItem").addEventListener("click",()=>{items.push({description:"",qty:1,rate:0,discount:0});renderItems()});

function switchTab(newTab){
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelector('[data-tab="'+newTab+'"]').classList.add("active");
  tab=newTab;
  $("lbl-ref").textContent=tab==="invoice"?"Invoice #":"Quote #";
  $("lbl-date").textContent=tab==="invoice"?"Invoice Date":"Quote Date";
  $("invoice-dates").style.display=tab==="invoice"?"grid":"none";
  $("quote-dates").style.display=tab==="invoice"?"none":"block";
  $("tc-field").style.display=tab==="invoice"?"none":"block";
  $("totLabel").textContent=tab==="invoice"?"Balance Due":"Total";
  $("generate").textContent=tab==="invoice"?"Download Invoice PDF":"Download Quote PDF";
  $("status").style.display="none";
}

document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  const newTab=t.dataset.tab;
  switchTab(newTab);
  $("refNumber").value=genId(newTab);
  $("notes").value=newTab==="quote"?"Looking forward to your business":"Thank you for your business";
}));

function setStatus(msg){const s=$("status");s.textContent=msg;s.style.display="block"}

// ---------- Load existing (recall) ----------
$("loadBtn").addEventListener("click",function(){
  var ref=$("loadRef").value.trim();
  if(!ref){setStatus("Enter a reference number to load");return}
  var pw=prompt("Password to load existing record:");
  if(!pw)return;
  setStatus("Loading "+ref+"…");
  var cbName="__cb_"+Date.now();
  var script=document.createElement("script");
  window[cbName]=function(res){
    try{delete window[cbName];document.head.removeChild(script)}catch(e){}
    if(!res||!res.ok){setStatus("Load failed: "+(res&&res.error||"unknown"));return}
    var d=res.data;
    if(d.type&&d.type!==tab){switchTab(d.type)}
    $("refNumber").value=d.refNumber||"";
    $("clientName").value=d.clientName||"";
    $("subject").value=d.subject||"";
    if(d.date)$("date").value=d.date;
    if(d.dueDate)$("dueDate").value=d.dueDate;
    if(d.expiryDate)$("expiryDate").value=d.expiryDate;
    if(d.terms){
      var termsEl=$("terms");
      for(var i=0;i<termsEl.options.length;i++){
        if(termsEl.options[i].value===d.terms||termsEl.options[i].text===d.terms){termsEl.selectedIndex=i;break}
      }
    }
    if(typeof d.notes==="string"&&d.notes)$("notes").value=d.notes;
    if(typeof d.termsConditions==="string"&&d.termsConditions)$("termsConditions").value=d.termsConditions;
    items=(d.items&&d.items.length)?d.items.map(function(x){return{description:x.description||"",qty:+x.qty||0,rate:+x.rate||0,discount:+x.discount||0}}):[{description:"",qty:1,rate:0,discount:0}];
    renderItems();updateTotals();
    var msg="Loaded "+d.refNumber+" — edit and regenerate to save a new version";
    if(res.legacy)msg+=" (legacy record — some fields may be blank)";
    setStatus(msg);
  };
  script.onerror=function(){try{delete window[cbName];document.head.removeChild(script)}catch(e){}setStatus("Load failed — network or password error")};
  script.src=SHEET_URL+"?action=lookup&ref="+encodeURIComponent(ref)+"&pw="+encodeURIComponent(pw)+"&callback="+cbName+"&t="+Date.now();
  document.head.appendChild(script);
});

// ---------- PDF drawing ----------
function drawPDF(doc,data,type){
  const W=210,margin=18,contentW=W-margin*2;
  const dark=[26,26,28],muted=[120,120,122],headerBg=[245,243,238];
  let y=20;
  const markH=10, markW=markH*(LOGO_W/LOGO_H);
  try{ doc.addImage(LOGO_PNG,"PNG",margin,y-3,markW,markH); }catch(e){}
  doc.setFont("helvetica","bold");doc.setFontSize(16);doc.setTextColor(...dark);
  doc.text("echo labs",margin+markW+2,y+2);
  doc.setFont("helvetica","normal");doc.setFontSize(7);doc.setTextColor(...muted);
  doc.text("Plugged In. Stage Ready.",margin+markW+2,y+6);
  doc.setFont("helvetica","bold");doc.setFontSize(24);doc.setTextColor(...dark);
  doc.text(type==="invoice"?"Invoice":"Quote",W-margin,y+2,{align:"right"});
  doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(...muted);
  doc.text("# "+data.refNumber,W-margin,y+8,{align:"right"});
  y+=18;
  const compTop=y;
  doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor(...dark);
  doc.text(COMPANY.name,margin,y);y+=5;
  doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(...muted);
  [...COMPANY.address,COMPANY.phone,COMPANY.email,COMPANY.website].forEach(l=>{doc.text(l,margin,y);y+=4});
  let ry=compTop;
  if(type==="invoice"){
    doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(...muted);
    doc.text("Balance Due",W-margin,ry,{align:"right"});
    doc.setFont("helvetica","bold");doc.setFontSize(16);doc.setTextColor(...dark);
    doc.text("$"+fmt(data.total),W-margin,ry+7,{align:"right"});ry+=16;
  }
  doc.setFontSize(9);const lblX=128,valX=W-margin;
  const dr=(l,v)=>{doc.setFont("helvetica","normal");doc.setTextColor(...muted);doc.text(l,lblX,ry);doc.setTextColor(...dark);doc.text(v,valX,ry,{align:"right"});ry+=5};
  if(type==="invoice"){dr("Invoice Date :",fmtDate(data.date));dr("Terms :",data.terms);dr("Due Date :",fmtDate(data.dueDate));}
  else{dr("Quote Date :",fmtDate(data.date));dr("Expiry Date :",fmtDate(data.expiryDate));}
  y=Math.max(y,ry)+4;
  doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(...muted);
  doc.text("Bill To",margin,y);y+=5;
  doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor(...dark);
  doc.text(data.clientName,margin,y);y+=7;
  if(data.subject){
    doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(...muted);
    doc.text("Subject :",margin,y);y+=4;doc.setTextColor(...dark);
    const sl=doc.splitTextToSize(data.subject,contentW);doc.text(sl,margin,y);y+=sl.length*4+4;
  }else{y+=2}
  const hasDisc=data.items.some(i=>i.discount>0);
  const colX=hasDisc?{num:margin+4,desc:margin+12,qty:116,rate:138,disc:160,amt:W-margin-4}:{num:margin+4,desc:margin+12,qty:128,rate:152,amt:W-margin-4};
  doc.setFont("helvetica","bold");doc.setFontSize(8.5);doc.setTextColor(...muted);
  doc.text("#",colX.num,y+4);doc.text("ITEM & DESCRIPTION",colX.desc,y+4);
  doc.text("QTY",colX.qty,y+4,{align:"right"});doc.text("RATE",colX.rate,y+4,{align:"right"});
  if(hasDisc)doc.text("DISC",colX.disc,y+4,{align:"right"});
  doc.text("AMOUNT",colX.amt,y+4,{align:"right"});
  y+=7;
  doc.setDrawColor(...dark);doc.setLineWidth(0.4);doc.line(margin,y,W-margin,y);
  y+=3;
  doc.setFont("helvetica","normal");doc.setFontSize(9.5);
  data.items.forEach((it,i)=>{
    const amt=it.qty*it.rate*(1-it.discount/100);
    const dl=doc.splitTextToSize(it.description,colX.qty-colX.desc-6);
    const rh=Math.max(10,dl.length*4.5+5);doc.setTextColor(...dark);
    doc.text((i+1).toString(),colX.num,y+5);doc.text(dl,colX.desc,y+5);
    doc.text(it.qty.toFixed(2),colX.qty,y+5,{align:"right"});doc.text(it.rate.toFixed(2),colX.rate,y+5,{align:"right"});
    if(hasDisc)doc.text(it.discount>0?it.discount.toFixed(2)+"%":"0.00",colX.disc,y+5,{align:"right"});
    doc.text(fmt(amt),colX.amt,y+5,{align:"right"});y+=rh;
    if(i<data.items.length-1){doc.setDrawColor(230,227,220);doc.setLineWidth(0.2);doc.line(margin,y,W-margin,y);}
  });
  y+=6;
  const chipX=124,chipW=(W-margin)-chipX,chipPad=5,tValX=W-margin-chipPad;
  doc.setFont("helvetica","normal");doc.setFontSize(9.5);doc.setTextColor(...muted);
  doc.text("Sub Total",chipX+chipPad,y+4);doc.setTextColor(...dark);doc.text(fmt(data.subtotal),tValX,y+4,{align:"right"});y+=9;
  doc.setFillColor(...headerBg);doc.roundedRect(chipX,y,chipW,9,2.2,2.2,"F");
  doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor(...dark);
  doc.text("Total",chipX+chipPad,y+6);doc.text("$"+fmt(data.total),tValX,y+6,{align:"right"});y+=11;
  if(type==="invoice"){
    doc.setFillColor(...dark);doc.roundedRect(chipX,y,chipW,10,2.2,2.2,"F");
    doc.setFont("helvetica","bold");doc.setFontSize(10.5);doc.setTextColor(240,237,229);
    doc.text("Balance Due",chipX+chipPad,y+6.5);doc.text("$"+fmt(data.total),tValX,y+6.5,{align:"right"});y+=10;
  }
  y+=14;
  if(data.notes){
    doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor(...dark);
    doc.text("Notes",margin,y);y+=5;doc.setFont("helvetica","normal");doc.setFontSize(9);
    const nl=doc.splitTextToSize(data.notes,contentW);doc.text(nl,margin,y);y+=nl.length*4+3;
  }
  doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(...dark);
  doc.text("Payment — Bank Transfer",margin,y);y+=4;
  doc.setFont("helvetica","normal");
  doc.text("BSB: "+data.bsb,margin,y);y+=4;
  doc.text("Account No: "+data.accountNo,margin,y);y+=4;
  if(data.payId){doc.text("Pay ID: "+data.payId,margin,y);y+=4;}
  if(type==="invoice"){doc.setFont("helvetica","bold");doc.text("Reference: "+data.refNumber,margin,y);doc.setFont("helvetica","normal");}
  if(type==="quote"&&data.termsConditions){
    y+=10;doc.setFont("helvetica","bold");doc.setFontSize(10);
    doc.text("Terms & Conditions",margin,y);y+=5;
    doc.setFont("helvetica","normal");doc.setFontSize(9);
    const tl=doc.splitTextToSize(data.termsConditions,contentW);doc.text(tl,margin,y);
  }
}

// ---------- Generate ----------
$("generate").addEventListener("click",()=>{
  const clientName=$("clientName").value.trim();
  if(!clientName){setStatus("Please enter a client name");return}
  const valid=items.filter(i=>i.description.trim());
  if(!valid.length){setStatus("Please add at least one line item");return}
  const bsb=$("bsb").value.trim();
  const accountNo=$("accountNo").value.trim();
  const payId=$("payId").value.trim();
  if(!bsb||!accountNo){setStatus("Please enter BSB and Account Number");return}
  if(!window.jspdf){setStatus("PDF library still loading — wait a moment and try again.");return}
  try{localStorage.setItem(BANK_KEY,JSON.stringify({bsb,accountNo,payId}))}catch(e){}
  const sub=valid.reduce((s,i)=>s+i.qty*i.rate*(1-i.discount/100),0);
  const data={refNumber:$("refNumber").value,clientName,subject:$("subject").value.trim(),
    date:$("date").value,dueDate:$("dueDate").value,expiryDate:$("expiryDate").value,
    terms:$("terms").value,notes:$("notes").value.trim(),termsConditions:$("termsConditions").value.trim(),
    items:valid,subtotal:sub,total:sub,bsb,accountNo,payId};
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:"mm",format:"a4"});
  drawPDF(doc,data,tab);
  const fn=(tab==="invoice"?"Invoice_":"Quote_")+clientName.replace(/\s+/g,"_")+"_"+data.refNumber+".pdf";

  function saveNow(){ doc.save(fn); }
  if(SHEET_URL){
    try{
      // Send RAW ISO dates so recall can populate date inputs correctly
      var payload=encodeURIComponent(JSON.stringify({
        type:tab,
        refNumber:data.refNumber,
        clientName:data.clientName,
        subject:data.subject,
        items:data.items,
        total:fmt(data.total),
        date:data.date,
        dueDate:data.dueDate,
        expiryDate:data.expiryDate,
        terms:data.terms,
        notes:data.notes,
        termsConditions:data.termsConditions
      }));
      var beacon=new Image();
      beacon.onload=function(){setStatus("Logged \u2713 — your PDF is downloading\u2026");setTimeout(saveNow,1200);};
      beacon.onerror=function(){setStatus("Logging failed \u2717 — your PDF is downloading anyway");setTimeout(saveNow,1200);};
      var hp=encodeURIComponent(($("hp").value||"").trim());
      beacon.src=SHEET_URL+"?payload="+payload+"&hp="+hp+"&t="+Date.now();
      setTimeout(function(){ if(beacon){ saveNow(); } },4000);
    }catch(err){ saveNow(); }
  } else {
    setStatus("Done — check your downloads.");
    saveNow();
  }
});

renderItems();updateTotals();
</script>
